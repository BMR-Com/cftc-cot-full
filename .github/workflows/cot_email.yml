name: COT Report Weekly Email

on:
  schedule:
    # 3:30 PM ET = 19:30 UTC (EDT/Summer) or 20:30 UTC (EST/Winter)
    - cron: '30 19 * * 5'  # 19:30 UTC = 2:30 PM CDT / 3:30 PM EDT (Summer)
    - cron: '30 20 * * 5'  # 20:30 UTC = 2:30 PM CST / 3:30 PM EST (Winter)
    
  workflow_dispatch:
    inputs:
      retry_attempt:
        description: 'Retry attempt number (0=initial, 1=next-day)'
        required: false
        default: '0'

jobs:
  send-cot-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright pandas numpy python-dateutil pillow
          playwright install chromium --with-deps

      - name: Fetch COT data and generate PDF
        id: fetch_pdf
        env:
          CFTC_API_BASE: 'https://publicreporting.cftc.gov/resource/kh3c-gbw2.json'
          ATTEMPT: ${{ github.event.inputs.retry_attempt || '0' }}
          SKIP_FRESH_CHECK: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          echo "Event type: ${{ github.event_name }}"
          echo "Current UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Current ET:  $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Current CT:  $(TZ=America/Chicago date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Attempt: $ATTEMPT"
          
          MAX_ATTEMPTS=3
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MAX_ATTEMPTS=1
            echo "MANUAL RUN MODE: Single attempt"
          else
            echo "SCHEDULED MODE: Up to 3 attempts"
          fi
          
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Attempt $i at $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
            
            if python scripts/generate_pdf.py; then
              echo "pdf_status=success" >> $GITHUB_OUTPUT
              echo "SUCCESS: PDF generated"
              exit 0
            fi
            
            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "Waiting 5 minutes for CFTC data..."
              sleep 300
            fi
          done
          
          echo "pdf_status=failed" >> $GITHUB_OUTPUT
          echo "FAILED: CFTC data not available after $MAX_ATTEMPTS attempts"

      - name: Send email with PDF
        if: steps.fetch_pdf.outputs.pdf_status == 'success'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/send_email.py
          echo "Email sent at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Trigger next-day retry if failed (scheduled only)
        if: steps.fetch_pdf.outputs.pdf_status == 'failed' && github.event_name == 'schedule' && (github.event.inputs.retry_attempt || '0') == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cot-report-email.yml',
              ref: context.ref,
              inputs: { retry_attempt: '1' }
            });
            console.log('Next-day retry scheduled');
