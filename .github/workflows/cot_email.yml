name: COT Report Weekly Email

on:
  schedule:
    # 3:30 PM ET = 20:30 UTC (EST) or 19:30 UTC (EDT)
    # Run at both times to cover DST transitions safely
    - cron: '30 19 * * 5'  # 19:30 UTC = 3:30 PM EDT (Summer)
    - cron: '30 20 * * 5'  # 20:30 UTC = 3:30 PM EST (Winter)
    
  workflow_dispatch:
    inputs:
      retry_attempt:
        description: 'Retry attempt number (0=initial, 1=next-day)'
        required: false
        default: '0'

jobs:
  send-cot-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright pandas numpy python-dateutil pillow
          playwright install chromium --with-deps

      - name: Fetch COT data and generate PDF
        id: fetch_pdf
        env:
          CFTC_API_BASE: 'https://publicreporting.cftc.gov/resource/kh3c-gbw2.json'
          ATTEMPT: ${{ github.event.inputs.retry_attempt || '0' }}
        run: |
          echo "Attempt $ATTEMPT at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          for i in 1 2 3; do
            echo "Attempt $i: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            
            if python scripts/generate_pdf.py; then
              echo "pdf_status=success" >> $GITHUB_OUTPUT
              echo "PDF generated successfully on attempt $i"
              exit 0
            fi
            
            if [ $i -lt 3 ]; then
              echo "Attempt $i failed - waiting 5 minutes..."
              sleep 300
            fi
          done
          
          echo "pdf_status=failed" >> $GITHUB_OUTPUT
          echo "CFTC data not available after 3 attempts"

      - name: Send email with PDF
        if: steps.fetch_pdf.outputs.pdf_status == 'success'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/send_email.py
          echo "Email sent successfully with COT report"

      - name: Trigger next-day retry if failed (Attempt 0 only)
        if: steps.fetch_pdf.outputs.pdf_status == 'failed' && (github.event.inputs.retry_attempt || '0') == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tomorrow = new Date();
            tomorrow.setUTCDate(tomorrow.getUTCDate() + 1);
            
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cot-report-email.yml',
              ref: context.ref,
              inputs: { retry_attempt: '1' }
            });
            console.log('Next-day retry scheduled for tomorrow');
