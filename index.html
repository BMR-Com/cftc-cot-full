<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomberg Commodity Index - CFTC COT Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; color: #333; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
header { text-align: center; color: white; padding: 30px 20px 20px; margin-bottom: 20px; }
h1 { font-size: 2.2em; margin-bottom: 8px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.subtitle { font-size: 1.1em; opacity: 0.9; margin-bottom: 15px; }
.controls { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
.control-group { display: flex; flex-direction: column; gap: 6px; }
label { font-weight: 600; color: #1a1a1a; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
select, button, input[type="date"] { padding: 10px 16px; border: 2px solid #ccc; border-radius: 8px; font-size: 0.95em; background: white; color: #1a1a1a; }
select:focus, input[type="date"]:focus { outline: none; border-color: #2a5298; }
button { background: #2a5298; color: white; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 18px; }
button:hover:not(:disabled) { background: #1e3c72; transform: translateY(-1px); }
button:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }
#cropYear { border-color: #8B6914; }
#cropYearGroup label { color: #8B6914; }
.crop-notes-box { background: rgba(255,255,255,0.12); color: white; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid rgba(255,220,100,0.7); overflow: hidden; }
.crop-notes-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; user-select: none; font-weight: 700; font-size: 0.92em; }
.crop-notes-header:hover { background: rgba(255,255,255,0.08); }
.crop-notes-body { padding: 0 16px 14px; font-size: 0.82em; line-height: 1.6; }
.crop-notes-body p { margin-bottom: 8px; }
.crop-year-tbl { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8em; }
.crop-year-tbl th { background: rgba(255,255,255,0.2); padding: 5px 10px; text-align: left; }
.crop-year-tbl td { padding: 4px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.bcom-tag { display: inline-block; background: rgba(255,220,100,0.4); color: #ffe066; border-radius: 3px; padding: 1px 5px; font-size: 0.75em; font-weight: 700; margin-left: 4px; }
/* Crop-type tab bar */
.crop-tab-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.crop-tab { padding: 7px 18px; border: 2px solid #dee2e6; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.85em; background: white; color: #555; margin-top: 0; letter-spacing: 0; text-transform: none; transition: all 0.2s; }
.crop-tab:hover:not(:disabled) { transform: none; }
.crop-tab.active-old { background: #8B6914; color: white; border-color: #8B6914; }
.crop-tab.active-other { background: #1a6e35; color: white; border-color: #1a6e35; }
.crop-tab.active-all { background: #2a5298; color: white; border-color: #2a5298; }
.crop-panel { display: none; }
.crop-panel.active { display: block; }
.crop-panel-hdr { font-size: 0.92em; font-weight: 700; padding: 8px 14px; margin-bottom: 12px; border-radius: 6px; color: white; }
.hdr-old { background: #8B6914; }
.hdr-other { background: #1a6e35; }
.hdr-all { background: #2a5298; }
/* Zoom bar */
.zoom-bar { display: flex; align-items: center; gap: 10px; padding: 8px 0 2px; flex-wrap: wrap; border-top: 1px solid #f0f0f0; margin-top: 8px; }
.zoom-bar label { font-size: 0.8em; color: #555; text-transform: none; letter-spacing: 0; font-weight: 600; margin: 0; }
.zoom-slider { width: 200px; accent-color: #2a5298; cursor: pointer; margin: 0; padding: 0; height: 6px; border: none; background: transparent; vertical-align: middle; }
.zoom-lbl { font-size: 0.78em; color: #2a5298; font-weight: 700; min-width: 80px; }
.zoom-rst { margin-top: 0; padding: 4px 12px; font-size: 0.78em; background: #7f8c8d; letter-spacing: 0; text-transform: none; border-radius: 6px; }
.zoom-rst:hover:not(:disabled) { background: #5d6d7e; transform: none; }
/* Chart sections */
.chart-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); margin-bottom: 25px; }
.chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; border-bottom: 2px solid #ecf0f1; padding-bottom: 12px; }
.chart-title { font-size: 1.2em; font-weight: 700; color: #1a1a1a; }
.chart-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.chart-controls label { font-size: 0.8em; }
.chart-controls select { font-size: 0.85em; padding: 6px 10px; }
.chart-container { position: relative; height: 380px; }
/* Weekly detail */
.weekly-crop-section { margin-bottom: 18px; border-radius: 8px; overflow: hidden; border: 2px solid #dee2e6; }
.weekly-crop-hdr { padding: 8px 14px; font-weight: 700; font-size: 0.88em; color: white; }
.weekly-detail-tbl { width: 100%; border-collapse: collapse; font-size: 0.76em; }
.weekly-detail-tbl th { padding: 5px 6px; font-weight: 600; font-size: 0.78em; text-align: center; color: white; }
.weekly-detail-tbl td { padding: 4px 6px; text-align: right; font-family: monospace; font-size: 0.8em; border-bottom: 1px solid #eee; color: #1a1a1a; }
.weekly-detail-tbl td:first-child { text-align: left; font-family: inherit; font-weight: 600; }
.chg-row td { font-size: 0.73em; color: #666; border-bottom: 2px solid #dee2e6; }
.sub-pm, .cat-hdr-pm { background: #d4880f; }
.sub-sd, .cat-hdr-sd { background: #1a8c4e; }
.sub-mm, .cat-hdr-mm { background: #2a5298; }
.sub-or, .cat-hdr-or { background: #8e44ad; }
.val-pos { color: #1a8c4e; } .val-neg { color: #c0392b; }
.nodata-cell { color: #bbb; font-style: italic; font-size: 0.75em; }
/* Summary sections */
.summary-section { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); margin-bottom: 25px; }
.summary-title { font-size: 1.3em; font-weight: 700; color: #1a1a1a; }
.summary-table { width: 100%; border-collapse: collapse; font-size: 0.78em; }
.summary-table th { background: #2a5298; color: white; padding: 7px 5px; text-align: center; font-weight: 600; position: sticky; top: 0; z-index: 2; }
.summary-table td { padding: 5px; border-bottom: 1px solid #ecf0f1; text-align: center; color: #1a1a1a; }
.summary-table tr:hover { background: #f0f4f8; }
.commodity-name { text-align: left !important; font-weight: 600; }
.section-header { background: #34495e !important; color: white !important; font-weight: 700; text-align: left !important; padding: 8px !important; }
.data-cell { font-family: monospace; }
.positive-value { color: #1a8c4e; font-weight: 600; }
.negative-value { color: #c0392b; font-weight: 600; }
.table-container { max-height: 680px; overflow-y: auto; border-radius: 8px; border: 1px solid #dee2e6; }
.stats-legend { margin-top: 12px; padding: 12px; background: #f8f9fa; border-radius: 6px; font-size: 0.8em; }
/* Minmax bar */
.mmbar-wrap { width: 100%; }
.mmbar-cont { width: 100%; height: 16px; background: #e9ecef; border-radius: 8px; position: relative; margin: 2px 0; overflow: hidden; }
.mmbar-dot { position: absolute; width: 9px; height: 9px; border-radius: 50%; border: 2px solid white; top: 50%; transform: translate(-50%, -50%); z-index: 5; }
.mmbar-lbl { display: flex; justify-content: space-between; font-size: 0.62em; color: #777; }
/* Exec summary */
.exec-summary { background: white; padding: 20px 25px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); margin-bottom: 25px; }
.exec-title { font-size: 1.3em; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; border-bottom: 2px solid #2a5298; padding-bottom: 8px; }
.exec-analysis { font-size: 0.86em; line-height: 1.65; color: #1a1a1a; margin-bottom: 16px; padding: 12px 16px; background: #f8f9fa; border-left: 4px solid #2a5298; border-radius: 4px; }
.pctile-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.pctile-wrap { border-radius: 8px; overflow: hidden; border: 1px solid #dee2e6; }
.pctile-title { font-size: 0.72em; font-weight: 700; color: white; padding: 6px 8px; text-align: center; }
.pt-gs { background: #c0392b; } .pt-ns { background: #d4880f; } .pt-gl { background: #1a8c4e; }
.pt-gso { background: #a93226; } .pt-nso { background: #b7950b; } .pt-glo { background: #1e8449; }
.pctile-tbl { width: 100%; border-collapse: collapse; font-size: 0.74em; }
.pctile-tbl th { background: #34495e; color: white; padding: 4px 6px; font-size: 0.76em; text-align: left; }
.pctile-tbl th:last-child { text-align: right; }
.pctile-tbl td { padding: 3px 6px; border-bottom: 1px solid #eee; color: #1a1a1a; font-size: 0.9em; }
.pctile-tbl td:last-child { text-align: right; font-weight: 700; font-family: monospace; }
/* Scatter */
.scatter-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 15px; }
.scatter-wrap { background: #f8f9fa; border-radius: 8px; padding: 12px; }
.scatter-title { font-size: 0.85em; font-weight: 600; color: #1a1a1a; text-align: center; margin-bottom: 8px; }
.scatter-cont { height: 340px; position: relative; }
.comm-legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 12px; padding: 10px; background: #f8f9fa; border-radius: 8px; }
.comm-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.78em; color: #1a1a1a; }
/* Commodity/year selectors */
.comm-sel { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; padding: 10px; background: #e8f4fd; border-radius: 8px; align-items: center; }
.comm-sel-label { font-weight: 700; font-size: 0.82em; color: #1565c0; width: 100%; margin-bottom: 4px; }
.comm-chip { padding: 4px 12px; border: 2px solid #90caf9; border-radius: 18px; cursor: pointer; font-size: 0.78em; background: white; user-select: none; color: #1a1a1a; }
.comm-chip:hover { border-color: #1976d2; background: #bbdefb; }
.comm-chip.active { background: #1976d2; color: white; border-color: #1976d2; }
.chip-all { background: #1a8c4e !important; color: white !important; border-color: #1a8c4e !important; font-weight: 700; }
.chip-none { background: #c0392b !important; color: white !important; border-color: #c0392b !important; font-weight: 700; }
.sel-count { font-size: 0.78em; color: #333; font-style: italic; margin-left: 4px; }
.yr-sel { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; padding: 8px; background: #f8f9fa; border-radius: 8px; align-items: center; }
.yr-chip { padding: 4px 10px; border: 2px solid #ccc; border-radius: 18px; cursor: pointer; font-size: 0.8em; background: white; color: #1a1a1a; }
.yr-chip:hover { border-color: #2a5298; }
.yr-chip.active { background: #2a5298; color: white; border-color: #2a5298; }
.loading { display: none; text-align: center; padding: 30px; color: white; font-size: 1.1em; }
.spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid white; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.error { background: #c0392b; color: white; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; font-family: monospace; font-size: 0.85em; }
.warning { background: #d4880f; color: #1a1a1a; padding: 12px; border-radius: 8px; margin: 10px 0; display: none; }
.debug-panel { background: #1a1a1a; color: #ecf0f1; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; font-family: monospace; font-size: 0.8em; max-height: 400px; overflow-y: auto; }
.info-box { background: rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid rgba(255,255,255,0.5); font-size: 0.85em; line-height: 1.5; }
#commoditySelect { min-width: 280px; cursor: pointer; }
@media (max-width: 1200px) { .scatter-grid { grid-template-columns: 1fr 1fr 1fr; } .pctile-row { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px) { h1 { font-size: 1.6em; } .controls { flex-direction: column; } .chart-container { height: 280px; } .scatter-grid { grid-template-columns: 1fr 1fr!important; } .pctile-row { grid-template-columns: 1fr 1fr; } }
.chart-subtitle { font-size:0.82em; color:#666; margin-top:3px; font-weight:400; }
/* Charts 1+2 and 3+4 paired with subtle separator */
#chart2, #chart4 { border-top: 2px dashed #e8ecf0; margin-top: 0; }

@media print {
  @page { size:A4 landscape; margin:7mm 9mm; }
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;}
  .controls,.loading,.error,.warning,.debug-panel,.zoom-bar,.comm-sel,.yr-sel,.crop-tab-bar{display:none!important;}
  header,h1,.subtitle,.info-box{display:none!important;}
  .container{padding:0!important;max-width:100%!important;}

  /* ── Exec Summary (All BCOM): 1 page ── */
  #execSec{page-break-before:always!important;page-break-inside:avoid!important;padding:6px 8px!important;box-shadow:none!important;margin:0!important;border-radius:0!important;}
  .exec-title{font-size:8.5pt!important;margin-bottom:3px!important;padding-bottom:3px!important;}
  .exec-analysis{font-size:6pt!important;padding:3px 5px!important;margin-bottom:5px!important;line-height:1.35!important;}
  .pctile-row{gap:3px!important;grid-template-columns:repeat(6,1fr)!important;}
  .pctile-title{font-size:6pt!important;padding:2px 3px!important;}
  .pctile-tbl{font-size:6pt!important;}
  .pctile-tbl td,.pctile-tbl th{padding:1.5px 3px!important;}

  /* ── BCOM Market Summary: exactly 2 pages ── */
  #sumSec{page-break-before:always!important;padding:4px 6px!important;box-shadow:none!important;border-radius:0!important;}
  .summary-title{font-size:8pt!important;margin-bottom:3px!important;}
  .summary-table{font-size:0!important;}
  .summary-table th{font-size:4.8pt!important;padding:1.5px 1px!important;background:#2a5298!important;color:white!important;position:static!important;white-space:nowrap!important;}
  .summary-table td{font-size:4.8pt!important;padding:1px!important;border-bottom:0.3px solid #eee!important;}
  .summary-table tr{page-break-inside:avoid!important;}
  .mmbar-cont{height:7px!important;border-radius:4px!important;}
  .mmbar-dot{width:6px!important;height:6px!important;}
  .mmbar-lbl{font-size:4pt!important;}
  .mmbar-wrap{min-width:50px!important;}
  .section-header{font-size:5.5pt!important;padding:1.5px 3px!important;}
  .commodity-name{font-size:5pt!important;}
  .data-cell{font-size:4.8pt!important;}
  .positive-value,.negative-value{font-size:4.8pt!important;}
  .stats-legend{display:none!important;}

  /* ── 4-Week Detail: 1 page ── */
  #weeklyDetail{page-break-before:always!important;page-break-inside:avoid!important;padding:4px 6px!important;box-shadow:none!important;border-radius:0!important;}
  #wdTitle{font-size:8pt!important;}
  #wdSummary{font-size:6pt!important;padding:3px 5px!important;margin-bottom:4px!important;line-height:1.3!important;}
  .weekly-crop-section{margin-bottom:5px!important;}
  .weekly-crop-hdr{padding:2px 6px!important;font-size:6pt!important;}
  .weekly-detail-tbl{font-size:5pt!important;}
  .weekly-detail-tbl th{padding:1.5px 2px!important;font-size:5pt!important;}
  .weekly-detail-tbl td{padding:1.5px 2px!important;font-size:5.5pt!important;}
  .chg-row td{font-size:4.5pt!important;}

  /* ── Charts: generic ── */
  /* Hide the metric/agg dropdowns inside each chart — they're not needed in print */
  .chart-controls{display:none!important;}
  .chart-section{box-shadow:none!important;padding:5px 8px!important;margin:0!important;border-radius:0!important;page-break-inside:avoid!important;}
  .chart-title{font-size:9pt!important;}
  .chart-subtitle{font-size:7.5pt!important;display:block!important;margin-top:1px!important;}
  .chart-header{margin-bottom:4px!important;padding-bottom:4px!important;}
  /* Prevent canvas overflow */
  .chart-container{overflow:hidden!important;max-height:none!important;}

  /* ── Position Analysis + All Trader Categories = 1 page ── */
  #chart1{page-break-before:always!important;}
  #chart1 .chart-container{height:210px!important;}
  #chart2{page-break-before:avoid!important;margin-top:8px!important;padding-top:6px!important;border-top:1.5px dashed #ccc!important;}
  #chart2 .chart-container{height:200px!important;}

  /* ── Trader Count + Position Size = 1 page ── */
  #chart3{page-break-before:always!important;}
  #chart3 .chart-container{height:210px!important;}
  #chart4{page-break-before:avoid!important;margin-top:8px!important;padding-top:6px!important;border-top:1.5px dashed #ccc!important;}
  #chart4 .chart-container{height:200px!important;}

  /* ── Seasonality: 1 page ── */
  #chart5{page-break-before:always!important;}
  #chart5 .chart-container{height:330px!important;}
  #seaNote{font-size:6pt!important;padding:2px 6px!important;margin-top:3px!important;}

  /* ── Scatter: 1 page each — bottom legend only ── */
  #chart6{page-break-before:always!important;}
  #chart7{page-break-before:always!important;}
  .scatter-cont{height:195px!important;overflow:hidden!important;}
  .scatter-wrap{padding:4px!important;}
  .scatter-title{font-size:6pt!important;margin-bottom:2px!important;}
  .comm-legend{display:flex!important;flex-wrap:wrap!important;gap:2px 6px!important;padding:4px!important;margin-top:4px!important;border-top:1px solid #eee!important;}
  .comm-legend-item{font-size:5pt!important;gap:3px!important;}
  .comm-legend-item div{width:7px!important;height:7px!important;}

  /* ── Agri Exec Summary: 1 page ── */
  #agriExecSec{page-break-before:always!important;padding:4px 6px!important;box-shadow:none!important;border-radius:0!important;}
  #agriExecSec .exec-title{font-size:8pt!important;margin-bottom:3px!important;}
  #agriExecSec .crop-panel-hdr{font-size:6.5pt!important;padding:2px 6px!important;margin:3px 0 2px!important;border-radius:3px!important;}
  #agriExecSec .exec-analysis{font-size:5.5pt!important;padding:2px 4px!important;margin-bottom:3px!important;line-height:1.25!important;}
  #agriExecSec .pctile-row{margin-bottom:3px!important;gap:2px!important;}
  #agriExecSec .pctile-title{font-size:5.5pt!important;padding:1.5px 2px!important;}
  #agriExecSec .pctile-tbl{font-size:5.5pt!important;}
  #agriExecSec .pctile-tbl td,#agriExecSec .pctile-tbl th{padding:1px 2px!important;}

  /* ── Agri Market Summary: 1 page per crop section ── */
  #agriSumSec{page-break-before:always!important;padding:0!important;box-shadow:none!important;border-radius:0!important;}
  #agriSumSec .summary-title{display:none!important;}
  #agriSumSec .summary-table th{font-size:4.5pt!important;padding:1px!important;}
  #agriSumSec .summary-table td{font-size:4.5pt!important;padding:1px!important;}
  #agriSumSec .mmbar-cont{height:6px!important;} #agriSumSec .mmbar-lbl{font-size:3.5pt!important;}
  .agri-crop-block{page-break-before:always!important;page-break-inside:avoid!important;padding:4px 8px!important;}
  .agri-crop-block:first-child{page-break-before:avoid!important;}
  .agri-crop-block .agri-block-title{font-size:8pt!important;font-weight:700!important;margin-bottom:3px!important;}
  .agri-crop-block .crop-panel-hdr{font-size:7pt!important;padding:3px 8px!important;margin-bottom:4px!important;}

  /* ── Agri Seasonality: 1 page (3 stacked charts) ── */
  #agriSeaSec{page-break-before:always!important;padding:4px 6px!important;box-shadow:none!important;border-radius:0!important;}
  #agriSeaSec .chart-header{margin-bottom:2px!important;}
  #agriSeaSec .chart-title{font-size:8pt!important;}
  .agri-sea-block{margin-top:0!important;}
  /* Each block has fixed height budget: hdr(16pt) + chart(153px→115pt) = ~131pt × 3 = 393pt, fits in 555pt */
  #agriSeaSec .agri-sea-block .crop-panel-hdr{font-size:6.5pt!important;padding:1px 6px!important;margin:5px 0 2px!important;}
  #agriSeaSec .chart-container{height:200px!important;overflow:hidden!important;}
  #agriSeaSec .agri-sea-block .crop-panel-hdr+.chart-container{margin-top:0!important;}
  #agriSeaSec [id^=aSeaNote]{display:none!important;}
}
/* ── Tab bar ── */
#tabBar{display:flex;gap:0;background:#1e3c72;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3);}

function getFM(cat,crop){
  if(!crop||crop==='all') return TF[cat]||TF.managed_money;

  if(crop==='other')      return TF_OTHER[cat]||TF_OTHER.managed_money;
  return TF[cat]||TF.managed_money;
}

function fetchT(url,ms){
  ms=ms||15000;
  return new Promise(function(res,rej){
    var t=setTimeout(function(){rej(new Error('Timeout'));},ms);
    fetch(url).then(function(r){clearTimeout(t);res(r);}).catch(function(e){clearTimeout(t);rej(e);});
  });
}
function showL(on,txt){
  document.getElementById('loading').style.display=on?'block':'none';
  if(txt)document.getElementById('loadingText').textContent=txt;
  /* Only disable the main action buttons, not AI or utility buttons */

function showE(m){var e=document.getElementById('errDiv');e.textContent=m;e.style.display='block';setTimeout(function(){e.style.display='none';},12000);}
function hideE(){document.getElementById('errDiv').style.display='none';}
function wk(d){var u=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var dn=u.getUTCDay()||7;u.setUTCDate(u.getUTCDate()+4-dn);var y=new Date(Date.UTC(u.getUTCFullYear(),0,1));return Math.ceil((((u-y)/86400000)+1)/7);}
function pct(arr,v){var s=arr.slice().sort(function(a,b){return a-b;});var i=s.indexOf(v);return s.length>1?(i/(s.length-1))*100:50;}
function pts(dates,vals){return dates.map(function(d,i){return{x:d,y:vals[i]};});}
function si(v){return(v==null||v==='')?0:(parseInt(v)||0);}
function ff(n){return Math.abs(n)>=1000?(n/1000).toFixed(1)+'k':n.toLocaleString();}

function findF(rec,pats){
  if(!pats||!pats.length)return null;
  /* Pass 1: exact match with non-empty value */
  for(var i=0;i<pats.length;i++){var p=pats[i];if(rec.hasOwnProperty(p)&&rec[p]!=null&&rec[p]!=='')return p;}
  /* Pass 2: exact match even if value is null/empty (field exists in schema) */
  for(var i=0;i<pats.length;i++){if(rec.hasOwnProperty(pats[i]))return pats[i];}
  /* Pass 3: case-insensitive */
  var k=Object.keys(rec);
  for(var i=0;i<pats.length;i++){var lp=pats[i].toLowerCase();for(var j=0;j<k.length;j++){if(k[j].toLowerCase()===lp)return k[j];}}
  return null;
}

/* Fuzzy field finder: returns first key containing ALL word fragments */
function findFuzzy(keys,words){
  var wl=words.map(function(w){return w.toLowerCase();});
  return keys.find(function(k){var kl=k.toLowerCase();return wl.every(function(w){return kl.indexOf(w)!==-1;});})
         ||null;
}

function matchComm(name,list){
  var u=name.toUpperCase();
  for(var i=0;i<list.length;i++){if(list[i].toUpperCase()===u)return list[i];}
  for(var i=0;i<list.length;i++){if(list[i].toUpperCase().indexOf(u)!==-1)return list[i];}
  var np=u.split(' - ')[0].trim(),ep2=u.split(' - ').slice(1).join(' - ').trim();
  for(var i=0;i<list.length;i++){var cu=list[i].toUpperCase(),cn=cu.split(' - ')[0].trim(),ce=cu.split(' - ').slice(1).join(' - ').trim();if(cn.indexOf(np)!==-1&&(!ep2||ce.indexOf(ep2)!==-1))return list[i];}
  for(var i=0;i<list.length;i++){var cn=list[i].toUpperCase().split(' - ')[0].trim();if(cn===np||cn.indexOf(np)!==-1||np.indexOf(cn)!==-1)return list[i];}
  return null;
}

/* ===========================================================
   PROCESS DATA — safe and normal versions
   =========================================================== */
function procData(raw,cat,crop){
  cat=cat||'managed_money';crop=crop||'all';
  if(!raw||!raw.length)return null;
  raw=raw.slice().sort(function(a,b){return new Date(a.report_date_as_yyyy_mm_dd)-new Date(b.report_date_as_yyyy_mm_dd);});
  /* Use the LAST (most recent) record for field detection — early records (pre-2009)
     may have null crop-year fields since CFTC only introduced old/other breakdown in 2009 */
  var f=raw[raw.length-1],fFirst=raw[0],fm=getFM(cat,crop);
  var allKeys=Object.keys(f);
  /* Primary field detection from most recent record */
  var fl={L:findF(f,fm.long),S:findF(f,fm.short),Sp:findF(f,fm.spread),tl:findF(f,fm.tl),ts:findF(f,fm.ts)};
  /* Fuzzy fallback for crop-year fields if exact names not found */
  if(!fl.L&&crop!=='all'){
    var sfx=crop;  /* 'old' or 'other' */
    var catKey=cat==='managed_money'?'money':cat==='swap_dealers'?'swap':cat==='prod_merc'?'merc':'rept';
    fl.L=findFuzzy(allKeys,['long',sfx,catKey])||findFuzzy(allKeys,['long',sfx]);
    fl.S=findFuzzy(allKeys,['short',sfx,catKey])||findFuzzy(allKeys,['short',sfx]);
  }
  /* OI: prefer crop-specific, fall back to all */
  var oiPats=crop==='all'?['open_interest_all','open_interest']:['open_interest_'+crop,'open_interest_all','open_interest'];
  fl.oi=findF(f,oiPats)||findF(fFirst,oiPats);
  if(!fl.L||!fl.S){
    console.warn('[procData] No fields for',cat,crop,'- tried:',fm.long,fm.short,'- available crop fields:',allKeys.filter(function(k){return k.indexOf(crop)!==-1;}).slice(0,8));
    return null;
  }
  var n=raw.length,p={dates:[],long:[],short:[],spread:[],tL:[],tS:[],oi:[],cat:cat,crop:crop,comm:fFirst.market_and_exchange_names};
  for(var i=0;i<n;i++){var d=raw[i];p.dates.push(d.report_date_as_yyyy_mm_dd);p.long.push(si(d[fl.L]));p.short.push(si(d[fl.S]));p.spread.push(fl.Sp?si(d[fl.Sp]):0);p.tL.push(fl.tl?si(d[fl.tl]):0);p.tS.push(fl.ts?si(d[fl.ts]):0);p.oi.push(fl.oi?si(d[fl.oi]):0);}
  p.tT=p.tL.map(function(v,i){return v+p.tS[i];});
  p.net=p.long.map(function(v,i){return v-p.short[i];});
  p.lPct=p.oi.map(function(v,i){return v>0?p.long[i]/v*100:0;});
  p.sPct=p.oi.map(function(v,i){return v>0?p.short[i]/v*100:0;});
  p.nPct=p.lPct.map(function(v,i){return v-p.sPct[i];});
  p.plL=p.tL.map(function(v,i){return v>0?p.long[i]/v:0;});
  p.plS=p.tS.map(function(v,i){return v>0?p.short[i]/v:0;});
  return p;
}

/* Returns zeroed dataset if fields not found — so tables render gracefully */
function procSafe(raw,cat,crop){
  var r=procData(raw,cat,crop);
  if(r)return r;
  if(!raw||!raw.length)return null;
  var n=raw.length,z=function(){return new Array(n).fill(0);};
  var dates=raw.map(function(d){return d.report_date_as_yyyy_mm_dd;});
  return{dates:dates,long:z(),short:z(),spread:z(),tL:z(),tS:z(),oi:z(),tT:z(),net:z(),lPct:z(),sPct:z(),nPct:z(),plL:z(),plS:z(),cat:cat,crop:crop,_nd:true,comm:raw[0].market_and_exchange_names};
}

/* ===========================================================
   LOAD COMMODITY LIST
   Always shows dropdown immediately from hardcoded BCOM names.
   API verification runs in background and updates matches silently.
   =========================================================== */
function loadList(){
  /* Step 1: Build dropdown immediately from hardcoded BCOM names — no API wait */
  buildFallback();
  showL(false);

  /* Step 2: Quietly verify/update names against the live API in the background */
  var url=EP.combined+'?$select=market_and_exchange_names&$limit=5000&$order=report_date_as_yyyy_mm_dd+DESC';
  var ctrl=typeof AbortController!=='undefined'?new AbortController():null;
  var tid=setTimeout(function(){if(ctrl)ctrl.abort();},20000);
  fetch(url,ctrl?{signal:ctrl.signal}:{})
  .then(function(r){clearTimeout(tid);if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(function(data){
    if(!Array.isArray(data)||!data.length)return;
    var seen={};apiList=[];
    data.forEach(function(d){var n=d.market_and_exchange_names;if(n&&!seen[n]){seen[n]=true;apiList.push(n);}});
    apiList.sort();
    /* Re-build dropdown with exact API names for accurate fetching */
    buildSel(apiList);
    buildSeaCommSel();
  })
  .catch(function(e){
    /* API unreachable — hardcoded fallback already loaded, just log */
    console.warn('API name verify failed (using hardcoded names):',e.message);
  });
}

function buildSel(api){

    if(any)sel.appendChild(og);
  });sel.disabled=false;
}

/* ===========================================================
   FETCH DATA
   =========================================================== */
function fetchData(){
  var comm=document.getElementById('commoditySelect').value,rt=document.getElementById('reportType').value,tc=document.getElementById('traderCategory').value,sd=document.getElementById('startDate').value,ed=document.getElementById('endDate').value;
  if(!comm){showE('Select a commodity first');return;}
  var crop=document.getElementById('cropYear').value||'all';
  showL(true,'Fetching '+comm.split(' - ')[0]+'...');hideE();
  var ep=EP[rt],enc=comm.replace(/'/g,"''");
  var url=ep+"?$where=market_and_exchange_names='"+enc+"' AND report_date_as_yyyy_mm_dd >= '"+sd+"' AND report_date_as_yyyy_mm_dd <= '"+ed+"'&$order=report_date_as_yyyy_mm_dd ASC&$limit=10000";
  dbgInfo={url:url,comm:comm,cat:tc};

function onZoom(key,val){

  var ch=charts[key];if(!ch||!CD)return;

}
function resetZoom(key){
  zPct[key]=100;var s=document.getElementById('zs_'+key);if(s)s.value=100;
  var ch=charts[key];if(ch&&CD){applyZoom(ch,key);updateZoomLbl(key);}
}
function applyZoom(ch,key){
  var p=zPct[key]||100,dates=CD.dates,n=dates.length;
  if(p>=100){ch.options.scales.x.min=undefined;ch.options.scales.x.max=undefined;}
  else{var show=Math.max(8,Math.round(n*p/100)),si2=Math.max(0,n-show);ch.options.scales.x.min=dates[si2];ch.options.scales.x.max=dates[n-1];}
  ch.update('none');
}
function updateZoomLbl(key){
  var el=document.getElementById('zl_'+key);if(!el)return;
  var p=zPct[key]||100;if(p>=100){el.textContent='All data';return;}
  el.textContent='Last ~'+Math.max(8,Math.round(CD.dates.length*p/100))+' wks';
}

function doPrint(){
  /* Explicitly resize every chart canvas to its print height before printing.
     This ensures Chart.js redraws at the correct size rather than overflowing. */
  var pH={
    posChart:210,cmpChart:200,trdChart:210,szChart:200,seaChart:330,
    sc1:195,sc2:195,sc3:195,sc4:195,sc5:195,sc6:195,
    sp1:195,sp2:195,sp3:195,sp4:195,sp5:195,sp6:195,
    aSeaChartOld:200,aSeaChartOther:200,aSeaChartAll:200
  };
  var saved=[];
  Object.keys(pH).forEach(function(id){
    var canvas=document.getElementById(id);if(!canvas)return;
    var cont=canvas.parentElement;
    saved.push({el:cont,h:cont.style.height});
    cont.style.height=pH[id]+'px';
  });
  /* Resize all Chart.js instances */
  Object.keys(charts).forEach(function(k){if(charts[k]&&charts[k].resize){try{charts[k].resize();}catch(e){}}});
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      saved.forEach(function(s){s.el.style.height=s.h||'';});
      Object.keys(charts).forEach(function(k){if(charts[k]&&charts[k].resize){try{charts[k].resize();}catch(e){}}});
    },600);
  },400);
}

/* Build one section table from raw records for a given variant: 'all'|'old'|'other' */
function buildWDSection(raw, variant, weeks){
  if(!raw||!raw.length)return '<p style="color:#999;padding:16px;">No data.</p>';
  var recs=raw.slice().sort(function(a,b){
    return new Date(b.report_date_as_yyyy_mm_dd)-new Date(a.report_date_as_yyyy_mm_dd);
  }).slice(0, weeks+1);

  var f=WD[variant];
  var sample=recs[0];
  if(!sample.hasOwnProperty(f.mmL)||sample[f.mmL]==null||sample[f.mmL]===''){
    return '<div style="padding:14px;color:#8B6914;background:#fff8e1;border-radius:4px;">'+
      '⚠ No '+variant+' crop-year fields found for this commodity.</div>';
  }

  /* thead — PM: 3 cols (no Spread), SD/MM/OR: 4 cols */
  var h='<div style="overflow-x:auto;"><table class="weekly-detail-tbl"><thead><tr>';
  h+='<th rowspan="2" style="background:#34495e;color:white;">Date</th>';
  h+='<th colspan="3" class="cat-hdr-pm">Prod/Merchant</th>';
  h+='<th colspan="4" class="cat-hdr-sd">Swap Dealers</th>';
  h+='<th colspan="4" class="cat-hdr-mm">Managed Money</th>';
  h+='<th colspan="4" class="cat-hdr-or">Other Rept</th>';
  h+='<th rowspan="2" style="background:#1a1a1a;color:white;">Open Interest</th>';
  h+='</tr><tr>';
  h+='<th class="sub-pm">Long</th><th class="sub-pm">Short</th><th class="sub-pm">Net</th>';
  h+='<th class="sub-sd">Long</th><th class="sub-sd">Short</th><th class="sub-sd">Spread</th><th class="sub-sd">Net</th>';
  h+='<th class="sub-mm">Long</th><th class="sub-mm">Short</th><th class="sub-mm">Spread</th><th class="sub-mm">Net</th>';
  h+='<th class="sub-or">Long</th><th class="sub-or">Short</th><th class="sub-or">Spread</th><th class="sub-or">Net</th>';
  h+='</tr></thead><tbody>';

  function nc(n){return '<td class="'+(n>=0?'val-pos':'val-neg')+'">'+n.toLocaleString()+'</td>';}

  for(var w=0;w<Math.min(weeks,recs.length);w++){
    var rec=recs[w], isLatest=(w===0);
    var pmL=ri(rec,f.pmL), pmS=ri(rec,f.pmS);
    var sdL=ri(rec,f.sdL), sdS=ri(rec,f.sdS), sdSp=ri(rec,f.sdSp);
    var mmL=ri(rec,f.mmL), mmS=ri(rec,f.mmS), mmSp=ri(rec,f.mmSp);
    var orL=ri(rec,f.orL), orS=ri(rec,f.orS), orSp=ri(rec,f.orSp);
    var oi=ri(rec,f.oi);
    h+='<tr'+(isLatest?' style="background:#f0f7ff;font-weight:600;"':'')+'>'; 
    h+='<td>'+rec.report_date_as_yyyy_mm_dd.substring(0,10)+'</td>';
    h+='<td>'+pmL.toLocaleString()+'</td><td>'+pmS.toLocaleString()+'</td>'+nc(pmL-pmS);
    h+='<td>'+sdL.toLocaleString()+'</td><td>'+sdS.toLocaleString()+'</td><td>'+sdSp.toLocaleString()+'</td>'+nc(sdL-sdS);
    h+='<td>'+mmL.toLocaleString()+'</td><td>'+mmS.toLocaleString()+'</td><td>'+mmSp.toLocaleString()+'</td>'+nc(mmL-mmS);
    h+='<td>'+orL.toLocaleString()+'</td><td>'+orS.toLocaleString()+'</td><td>'+orSp.toLocaleString()+'</td>'+nc(orL-orS);
    h+='<td>'+oi.toLocaleString()+'</td></tr>';

    if(isLatest&&recs.length>1){
      var prev=recs[1];
      var ppmL=ri(prev,f.pmL),ppmS=ri(prev,f.pmS);
      var psdL=ri(prev,f.sdL),psdS=ri(prev,f.sdS),psdSp=ri(prev,f.sdSp);
      var pmmL=ri(prev,f.mmL),pmmS=ri(prev,f.mmS),pmmSp=ri(prev,f.mmSp);
      var porL=ri(prev,f.orL),porS=ri(prev,f.orS),porSp=ri(prev,f.orSp);
      var poi=ri(prev,f.oi);
      h+='<tr class="chg-row"><td style="font-style:italic;color:#666;">Chg vs '+prev.report_date_as_yyyy_mm_dd.substring(0,10)+'</td>';
      h+=chgCell(pmL-ppmL)+chgCell(pmS-ppmS)+chgCell((pmL-pmS)-(ppmL-ppmS));
      h+=chgCell(sdL-psdL)+chgCell(sdS-psdS)+chgCell(sdSp-psdSp)+chgCell((sdL-sdS)-(psdL-psdS));
      h+=chgCell(mmL-pmmL)+chgCell(mmS-pmmS)+chgCell(mmSp-pmmSp)+chgCell((mmL-mmS)-(pmmL-pmmS));
      h+=chgCell(orL-porL)+chgCell(orS-porS)+chgCell(orSp-porSp)+chgCell((orL-orS)-(porL-porS));
      h+=chgCell(oi-poi)+'</tr>';
    }
  }
  h+='</tbody></table></div>';
  return h;
}

  function pColor(p,r,g,b){var a=0.08+0.52*(p/100);return 'rgba('+r+','+g+','+b+','+a.toFixed(2)+')';}
  function fill(id,arr,field,r,g,b,inv){var tb=document.getElementById(id);if(!tb)return;tb.innerHTML='';arr.forEach(function(it){var v=inv?100-it[field]:it[field];v=Math.max(0,Math.min(100,v));var tr=document.createElement('tr');tr.innerHTML='<td>'+it.comm+'</td><td style="background:'+pColor(v,r,g,b)+';color:#1a1a1a;">'+v.toFixed(1)+'%</td>';tb.appendChild(tr);});}
  fill('t_gs',gs,'mSP',231,76,60,false);fill('t_ns',ns,'mNP',243,156,18,true);fill('t_gl',gl,'mLP',39,174,96,false);fill('t_gso',gso,'mSPoi',169,50,38,false);fill('t_nso',nso,'mNPoi',183,149,11,true);fill('t_glo',glo,'mLPoi',30,132,73,false);
  var eS=[],eL=[],cS=[],cL=[],longC=[],shortC=[];

  txt+='Positioning extremes are powerful contrarian signals. Crowded shorts fuel covering rallies; crowded longs create liquidation cascades.<br><br>';
  if(eS.length)txt+='<strong>&#x1F534; Extreme Gross Short (&gt;80th %ile):</strong> '+eS.join(', ')+' — Contrarian LONG bias, limited room to add shorts.<br>';
  if(cS.length)txt+='<strong>&#x1F7E0; Extreme Net Short (&lt;15th %ile):</strong> '+cS.join(', ')+' — Maximum bearishness, short-covering risk elevated.<br>';
  if(eL.length)txt+='<strong>&#x1F7E2; Extreme Gross Long (&gt;80th %ile):</strong> '+eL.join(', ')+' — Crowded longs, liquidation risk.<br>';
  if(cL.length)txt+='<strong>&#x1F535; Extreme Net Long (&gt;85th %ile):</strong> '+cL.join(', ')+' — Contrarian SHORT bias.<br>';

function mmBar(cur,mn,mx,isN){
  if(mn===mx)return '';
  var p=((cur-mn)/(mx-mn))*100,safe=Math.max(2,Math.min(98,p));
  var cl,grad;
  if(isN){
    if(cur>=0){cl='#1a8c4e';grad='linear-gradient(90deg,#d5f5e3 0%,#1a8c4e 100%)';}
    else{cl='#c0392b';grad='linear-gradient(90deg,#fadbd8 0%,#c0392b 100%)';}
  } else {cl='#2a5298';grad='linear-gradient(90deg,#d6eaf8 0%,#2a5298 100%)';}
  return '<div class="mmbar-wrap">'+
    '<div class="mmbar-cont">'+
      '<div style="position:absolute;left:0;top:0;height:100%;width:'+safe+'%;background:'+grad+';border-radius:8px;opacity:0.85;"></div>'+
      '<div class="mmbar-dot" style="left:'+safe+'%;background:'+cl+';border:2px solid white;box-shadow:0 0 3px rgba(0,0,0,0.4);"></div>'+
    '</div>'+
    '<div class="mmbar-lbl"><span>'+ff(mn)+'</span><span>'+ff(mx)+'</span></div>'+
  '</div>';
}

function buildSeaCommSel(){

  if(!CD)return;var ys={};CD.dates.forEach(function(d){ys[new Date(d).getFullYear()]=true;});
  var yrs=Object.keys(ys).map(Number).sort(),ct=document.getElementById('seaYrSel');ct.innerHTML='<strong style="font-size:0.85em;">Years:</strong>';
  seaYrs=new Set(yrs.slice(-3));

function drawSea(){
  var metric=document.getElementById('seaMet').value,agg=document.getElementById('seaAgg').value;
  var comms=Array.from(seaComms);if(!comms.length)return;
  var tc=document.getElementById('traderCategory').value,ep=EP[document.getElementById('reportType').value];
  var toFetch=comms.filter(function(c){return!seaCache[c];});
  if(toFetch.length>0){
    var done=0;
    toFetch.forEach(function(c){
      fetchT(ep+"?$where=market_and_exchange_names='"+c.replace(/'/g,"''")+"' AND report_date_as_yyyy_mm_dd >= '2006-01-01'&$order=report_date_as_yyyy_mm_dd ASC&$limit=10000",20000)
      .then(function(r){return r.json();}).then(function(d){if(d.length>0)seaCache[c]=procData(d,tc);}).catch(function(){})
      .finally(function(){done++;if(done>=toFetch.length)renderSea(metric,agg,comms,'seaChart','sea','seaNote',seaYrs);});
    });
  } else renderSea(metric,agg,comms,'seaChart','sea','seaNote',seaYrs);
}

function renderSea(metric,agg,comms,canvasId,chartKey,noteId,yearsSet){
  var yd={};
  comms.forEach(function(comm){var p=seaCache[comm];if(!p)return;
    p.dates.forEach(function(date,di){var yr=new Date(date).getFullYear();if(!yearsSet.has(yr))return;var w=wk(new Date(date));if(!yd[yr])yd[yr]={};if(!yd[yr][w])yd[yr][w]={s:0,c:0};
      var v=0;switch(metric){case'net':v=p.net[di];break;case'long':v=p.long[di];break;case'short':v=p.short[di];break;case'net_pct':v=p.nPct[di];break;case'traders_total':v=p.tT[di];break;case'per_trader_long':v=p.plL[di];break;case'per_trader_short':v=p.plS[di];break;}
      yd[yr][w].s+=v;yd[yr][w].c+=1;
    });
  });
  var yc=['#c0392b','#d4880f','#f39c12','#1a8c4e','#2980b9','#8e44ad','#16a085','#d35400','#2c3e50','#1abc9c'];

  cropComms.forEach(function(it){

function buildAgriSeaSel(){
  var cropComms=getCropBCOM();
  var ct=document.getElementById('aSeaCommSel');
  while(ct.children.length>1)ct.removeChild(ct.lastChild);
  if(agriSeaComms.size===0&&cropComms.length>0){
    /* Default: the currently selected commodity if it's a crop comm, else first crop comm */
    var selApi=CD?CD.comm:null;
    var selIsCrop=selApi&&cropComms.some(function(c){return c.api===selApi;});
    agriSeaComms=new Set([selIsCrop?selApi:cropComms[0].api]);
  }
  cropComms.forEach(function(bc){
    if(!agriRaw[bc.api])return;
    var ch=document.createElement('span');ch.className='comm-chip';ch.setAttribute('data-aapi',bc.api);ch.textContent=bc.name;
    ch.onclick=(function(api){return function(){if(agriSeaComms.has(api)){if(agriSeaComms.size>1)agriSeaComms.delete(api);}else agriSeaComms.add(api);refreshAgriSeaChips();drawAllAgriSea();};})(bc.api);
    ct.appendChild(ch);
  });
  refreshAgriSeaChips();
  /* Collect ALL years from agriRaw — full history since 2006 */
  var yrSet={};
  Object.keys(agriRaw).forEach(function(api){
    var arr=agriRaw[api];if(!arr)return;
    arr.forEach(function(d){var y=new Date(d.report_date_as_yyyy_mm_dd).getFullYear();if(y>=2006)yrSet[y]=true;});
  });
  var yrs=Object.keys(yrSet).map(Number).sort();
  if(!yrs.length){var now=new Date().getFullYear();for(var y2=2006;y2<=now;y2++)yrs.push(y2);}
  if(agriSeaYrs.size===0)agriSeaYrs=new Set(yrs.slice(-3));
  var ySel=document.getElementById('aSeaYrSel');ySel.innerHTML='<strong style="font-size:0.85em;">Years ('+yrs[0]+'–'+yrs[yrs.length-1]+'):</strong>';
  yrs.forEach(function(y){
    var c=document.createElement('div');c.className='yr-chip'+(agriSeaYrs.has(y)?' active':'');c.textContent=y;
    c.onclick=function(){if(agriSeaYrs.has(y)&&agriSeaYrs.size>1){agriSeaYrs.delete(y);c.classList.remove('active');}else if(!agriSeaYrs.has(y)){agriSeaYrs.add(y);c.classList.add('active');}drawAllAgriSea();};
    ySel.appendChild(c);
  });
}
function refreshAgriSeaChips(){
  document.querySelectorAll('#aSeaCommSel [data-aapi]').forEach(function(el){el.classList.toggle('active',agriSeaComms.has(el.getAttribute('data-aapi')));});
  var el=document.getElementById('aSeaCount');if(el)el.textContent='('+agriSeaComms.size+')';
}

  var metric=document.getElementById('aSMet').value,agg=document.getElementById('aSAgg').value;

function updateFormulaPreview(){

function computeFormulaSeries(rawData, terms){
    if(!rawData || !rawData.length || !terms.length) return [];

    var termData = terms.map(function(term){
        var p = procData(rawData, term.cat, term.crop);
        if(!p) return null;
        return { proc: p, metric: term.metric };
    });

    if(termData.some(function(t){ return t === null; })){
        console.warn('[Formula] Some terms could not be processed');
        return [];
    }

    var n = termData[0].proc.dates.length;
    var result = [];

    for(var i = 0; i < n; i++){
        var value = 0;

        for(var t = 0; t < terms.length; t++){
            var p = termData[t].proc;
            var m = termData[t].metric;
            var val = 0;

            switch(m){
                case 'long': val = p.long[i]; break;
                case 'short': val = p.short[i]; break;
                case 'spread': val = p.spread[i]; break;
                case 'net': val = p.net[i]; break;
                case 'net_pct_oi': val = p.nPct[i]; break;
                case 'long_pct_oi': val = p.lPct[i]; break;
                case 'short_pct_oi': val = p.sPct[i]; break;
                case 'traders_long': val = p.tL[i]; break;
                case 'traders_short': val = p.tS[i]; break;
                case 'per_trader_l': val = p.plL[i]; break;
                case 'per_trader_s': val = p.plS[i]; break;
                default: val = p.net[i];
            }

            if(t === 0){ value = val; }
            else { value = terms[t].op === '+' ? value + val : value - val; }
        }

        result.push({ date: p.dates[i].substring(0,10), value: value });
    }

    return result;
}

function calculatePercentiles(series, windowSize){
    return series.map(function(pt, i){
        var start = 0;
        if(windowSize && windowSize > 0){
            start = Math.max(0, i + 1 - windowSize);
        }
        var hist = series.slice(start, i + 1).map(function(s){ return s.value; });
        var below = hist.filter(function(v){ return v < pt.value; }).length;
        var equal = hist.filter(function(v){ return v === pt.value; }).length;
        var pct = ((below + 0.5 * equal) / hist.length) * 100;
        return { date: pt.date, value: pt.value, pctile: Math.round(pct * 10) / 10 };
    });
}

function updateFormulaCharts(){
    var terms = getFormulaTerms();

        if(formulaPctileChart){ formulaPctileChart.destroy(); formulaPctileChart = null; }
        if(formulaSeaChart){ formulaSeaChart.destroy(); formulaSeaChart = null; }
        return;
    }

    if(!window._formulaRawCache) window._formulaRawCache = {};

    if(window._formulaRawCache[commApi]){
        renderAllFormulaCharts(window._formulaRawCache[commApi], terms);
    } else {
        showL(true, 'Fetching formula data...');
        var ep = EP[document.getElementById('reportType').value] || EP.combined;
        fetchT(ep + "?$where=market_and_exchange_names='" + commApi.replace(/'/g,"''") + "' AND report_date_as_yyyy_mm_dd >= '2006-01-01'&$order=report_date_as_yyyy_mm_dd ASC&$limit=10000", 20000)
        .then(function(r){ return r.json(); })

        })
        .catch(function(e){
            showE('Error fetching data: ' + e.message);
            showL(false);
        });
    }
}

function renderFormulaSeasonalityChart(series){
    var ctx3 = document.getElementById('formulaSeaChart').getContext('2d');
    if(formulaSeaChart) formulaSeaChart.destroy();

    // Extract years from series
    var yrSet = {};
    series.forEach(function(s){ var y = parseInt(s.date.substring(0,4)); if(y >= 2006) yrSet[y] = true; });
    var allYrs = Object.keys(yrSet).map(Number).sort();

    // Default select last 3 years if not set
    if(formulaSeaYrs.size === 0 && allYrs.length > 0){
        formulaSeaYrs = new Set(allYrs.slice(-3));
    }

    // Build year selector chips
    var yrContainer = document.getElementById('formulaYearSelector');
    yrContainer.innerHTML = '<strong style="font-size:0.85em;">Years:</strong>';
    allYrs.forEach(function(y){
        var c = document.createElement('div');
        c.className = 'yr-chip' + (formulaSeaYrs.has(y) ? ' active' : '');
        c.textContent = y;
        c.onclick = function(){
            if(formulaSeaYrs.has(y) && formulaSeaYrs.size > 1){ formulaSeaYrs.delete(y); c.classList.remove('active'); }
            else if(!formulaSeaYrs.has(y)){ formulaSeaYrs.add(y); c.classList.add('active'); }
            renderFormulaSeasonalityChart(series);
        };
        yrContainer.appendChild(c);
    });

    // Build weekly seasonality data
    var yd = {};
    series.forEach(function(s){
        var yr = parseInt(s.date.substring(0,4));
        if(!formulaSeaYrs.has(yr)) return;
        var dt = new Date(s.date);
        var w = wk(dt);
        if(!yd[yr]) yd[yr] = {};
        if(!yd[yr][w]) yd[yr][w] = { sum: 0, count: 0 };
        yd[yr][w].sum += s.value;
        yd[yr][w].count += 1;
    });

    var yc = ['#c0392b','#d4880f','#f39c12','#1a8c4e','#2980b9','#8e44ad','#16a085','#d35400','#2c3e50','#1abc9c'];
    var sy = Array.from(formulaSeaYrs).sort();
    var ds = [];

    sy.forEach(function(yr, yi){
        if(!yd[yr]) return;
        var wd = new Array(53).fill(null);
        for(var w = 1; w <= 53; w++){
            var e = yd[yr][w];
            if(!e || e.count === 0) continue;
            wd[w-1] = e.sum / e.count;
        }
        ds.push({
            label: String(yr),
            data: wd,
            borderColor: yc[yi % yc.length],
            borderWidth: 2.5,
            pointRadius: 2,
            pointHoverRadius: 5,
            spanGaps: true,
            fill: false,
            tension: 0.3
        });
    });

    var wl = [];
    for(var i = 1; i <= 53; i++) wl.push('W' + i);

    var isPct = getFormulaTerms().some(function(t){ return t.metric.indexOf('pct') !== -1; });

    formulaSeaChart = new Chart(ctx3, {
        type: 'line',
        data: { labels: wl, datasets: ds },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                title: {
                    display: true,
                    text: 'Formula Seasonality — Weekly Average',
                    font: { size: 12, weight: 'bold' },
                    color: '#1a1a1a'
                },
                legend: {
                    position: 'top',
                    labels: { boxWidth: 11, font: { size: 10 }, color: '#333' }
                },
                zoom: {
                    pan: { enabled: true, mode: 'x' },
                    zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
                },
                tooltip: {
                    callbacks: {
                        title: function(it){ return 'Week ' + parseInt(it[0].label.replace('W','')); },
                        label: function(it){ return it.dataset.label + ': ' + Number(it.raw).toLocaleString(undefined, {maximumFractionDigits: isPct ? 2 : 0}) + (isPct ? '%' : ''); }
                    }
                }
            },
            scales: {
                x: {
                    title: { display: true, text: 'Week', font: { size: 10 }, color: '#333' },
                    ticks: { callback: function(v, i){ return i % 4 === 0 ? 'W' + (i+1) : ''; }, font: { size: 9 }, color: '#333' }
                },
                y: {
                    title: { display: true, text: isPct ? '%' : 'Value', font: { size: 10, weight: 'bold' }, color: '#333' },
                    ticks: {
                        callback: function(v){ return isPct ? v.toFixed(1) + '%' : (Math.abs(v) >= 1000 ? (v/1000).toFixed(0) + 'k' : v); },
                        font: { size: 9 }, color: '#333'
                    }
                }
            }
        }
    });

    var note = document.getElementById('formulaSeaNote');
    if(note){
        note.innerHTML = '<strong>Showing:</strong> ' + sy.length + ' years | <strong>Metric:</strong> Formula Value | <strong>Agg:</strong> Weekly Average';
    }
}

function onFormulaZoom(val){
    formulaZoomPct = parseInt(val);
    applyFormulaZoom();
    updateFormulaZoomLabel();
}

function applyFormulaZoom(){
    if(!formulaChart || !formulaChart.data || !formulaChart.data.labels) return;
    var dates = formulaChart.data.labels;
    var n = dates.length;
    var p = formulaZoomPct;

    if(p >= 100){
        formulaChart.options.scales.x.min = undefined;
        formulaChart.options.scales.x.max = undefined;
    } else {
        var show = Math.max(8, Math.round(n * p / 100));
        var si2 = Math.max(0, n - show);
        formulaChart.options.scales.x.min = dates[si2];
        formulaChart.options.scales.x.max = dates[n - 1];
    }
    formulaChart.update('none');
}

/* ── Persistence ── */
function saveCurrentFormula(){
    var terms = getFormulaTerms();
    if(!terms.length){ alert('Build a formula first before saving.'); return; }
    var name = prompt('Name this formula:', document.querySelector('#formula-preview span').textContent.substring(0, 50));
    if(!name) return;

    var saved = JSON.parse(localStorage.getItem('cot_custom_formulas') || '[]');
    saved.push({ name: name, terms: terms, created: new Date().toISOString() });
    localStorage.setItem('cot_custom_formulas', JSON.stringify(saved));
    loadSavedFormulas();
}

function loadSavedFormulas(){
    var saved = JSON.parse(localStorage.getItem('cot_custom_formulas') || '[]');
    var list = document.getElementById('saved-formulas-list');
    var empty = document.getElementById('saved-formulas-empty');
    if(!list) return;

    if(!saved.length){
        list.innerHTML = '';
        if(empty) empty.style.display = 'block';
        return;
    }
    if(empty) empty.style.display = 'none';

    list.innerHTML = saved.map(function(f, i){
        return '<div class="saved-chip" onclick="loadFormula(' + i + ')">' +
               f.name +
               '<span class="delete-chip" onclick="event.stopPropagation();deleteFormula(' + i + ')">×</span>' +
               '</div>';
    }).join('');
}

function loadFormula(index){
    var saved = JSON.parse(localStorage.getItem('cot_custom_formulas') || '[]');
    var formula = saved[index];
    if(!formula) return;

    document.getElementById('formula-terms').innerHTML = '';
    formula.terms.forEach(function(t, i){
        addFormulaTerm();
        var termEl = document.querySelectorAll('#formula-terms .formula-term-row')[i];
        if(i > 0) termEl.querySelector('.op-select').value = t.op;
        termEl.querySelector('.cat-select').value = t.cat;
        termEl.querySelector('.metric-select').value = t.metric;
        termEl.querySelector('.crop-select').value = t.crop;
    });
    updateFormulaPreview();
    updateFormulaCharts();
}

function deleteFormula(index){
    var saved = JSON.parse(localStorage.getItem('cot_custom_formulas') || '[]');
    saved.splice(index, 1);
    localStorage.setItem('cot_custom_formulas', JSON.stringify(saved));
    loadSavedFormulas();
}

function clearFormula(){
    document.getElementById('formula-terms').innerHTML = '';
    addFormulaTerm();
    updateFormulaPreview();
    if(formulaChart){ formulaChart.destroy(); formulaChart = null; }
    if(formulaPctileChart){ formulaPctileChart.destroy(); formulaPctileChart = null; }
    if(formulaSeaChart){ formulaSeaChart.destroy(); formulaSeaChart = null; }
    window._formulaRawCache = {};
    formulaSeaYrs = new Set();
}

/* Build context string from pre-computed JSON (or live chart data fallback) */
function buildAiContext(){
  var ctx='';
  var data=window._cotData;
  if(data&&data.commodities){
    ctx+='BCOM COT DATA — Report: '+data.report_date+' | History from: '+data.data_from+'\n\n';
    ctx+='MANAGED MONEY POSITIONING (net, wk change, percentile vs full history & 10yr, extremes):\n';
    data.commodities.forEach(function(comm){
      comm.variants.forEach(function(v){
        var mm=v.categories&&v.categories.managed_money;if(!mm)return;
        var p=mm.pctiles||{},h=mm.historical||{},hn=h.net||{};
        var crop=comm.is_crop?'['+v.crop_type.toUpperCase()+']':'';
        ctx+=comm.name+'('+comm.ticker+')'+crop+': ';
        ctx+='Net='+(mm.net||0).toLocaleString();
        ctx+=' Chg='+((mm.wk_chg_net||0)>=0?'+':'')+(mm.wk_chg_net||0).toLocaleString();
        ctx+=' Net%ile=Full:'+(p.net_full||'?')+'% 10yr:'+(p.net_10yr||'?')+'%';
        ctx+=' Long%ile:'+(p.long_full||'?')+'% Short%ile:'+(p.short_full||'?')+'%';
        ctx+=' Net%OI='+(mm.net_pct_oi||0).toFixed(1)+'%\n';
        if(hn['10yr_min']!==undefined)ctx+='  10yr: min='+hn['10yr_min']+'('+hn['10yr_min_date']+') max='+hn['10yr_max']+'('+hn['10yr_max_date']+')\n';
        if(hn.full_min!==undefined)ctx+='  AllTime: min='+hn.full_min+'('+hn.full_min_date+') max='+hn.full_max+'('+hn.full_max_date+')\n';
      });
    });
    ctx+='\nPROD/MERCHANT NET (full %ile):\n';
    data.commodities.forEach(function(comm){
      var v0=comm.variants&&comm.variants[0];if(!v0)return;
      var pm=v0.categories&&v0.categories.prod_merc;if(!pm)return;
      ctx+=comm.name+'('+comm.ticker+'): Net='+(pm.net||0).toLocaleString()+' %ile='+(pm.pctiles&&pm.pctiles.net_full||'?')+'%\n';
    });
  } else {
    ctx+='Pre-computed data not loaded. Using live chart data.\n';
    if(CD){
      var l=CD.net.length-1,tc=document.getElementById('traderCategory').value||'managed_money';
      ctx+='Selected: '+(CD.comm||'').split(' - ')[0]+' | '+(CAT_LBL[tc]||tc)+'\n';
      ctx+='Date: '+CD.dates[l].substring(0,10)+'\n';
      ctx+='Net: '+CD.net[l].toLocaleString()+' ('+pct(CD.net,CD.net[l]).toFixed(0)+'th %ile)\n';
      ctx+='Long: '+CD.long[l].toLocaleString()+' ('+pct(CD.long,CD.long[l]).toFixed(0)+'th %ile)\n';
      ctx+='Short: '+CD.short[l].toLocaleString()+' ('+pct(CD.short,CD.short[l]).toFixed(0)+'th %ile)\n';
    }
    if(scData&&scData.length){
      ctx+='\nALL BCOM MM (%ile):\n';
      scData.forEach(function(d){ctx+=d.comm+': Net='+d.mNP.toFixed(0)+'% Short='+d.mSP.toFixed(0)+'% Long='+d.mLP.toFixed(0)+'%\n';});
    }
  }
  return ctx;
}

async function aiQ(question){
  var key = getAiKey(); if(!key) return;
  var spin = document.getElementById('aiPane_spinner');
  var resp = document.getElementById('aiPane_response');
  var text = document.getElementById('aiPane_text');
  spin.style.display = 'block';
  resp.style.display = 'none';
  document.getElementById('aiChartArea').style.display = 'none';
  spin.scrollIntoView({behavior:'smooth', block:'start'});

  var context = buildAiContext();

  /* System prompt includes chart detection instructions */
  var SYS =
    'You are an expert commodity futures analyst specializing in CFTC COT reports and the Bloomberg Commodity Index (BCOM).\n\n' +
    'CHART DETECTION: When the user asks to plot, chart, graph, draw, or visualize data, you MUST:\n' +
    '1. Respond with your analysis text as normal.\n' +
    '2. At the END of your response, include a chart spec tag in this exact format (no spaces inside braces):\n' +
    '   [CHART:{"commodity":"<exact name>","metric":"<metric>","years":<number>,"crop_type":"<all|old|other>"}]\n\n' +
    'Valid commodity names: Brent Crude Oil, Natural Gas, WTI Crude Oil, Low Sulphur Gas Oil, ULS Diesel, RBOB Gasoline, Corn, Soybeans, Soybean Meal, Soybean Oil, Wheat SRW, HRW Wheat, Copper, Aluminum, Zinc, Nickel, Lead, Gold, Silver, Sugar, Coffee, Cocoa, Cotton, Live Cattle, Lean Hogs\n\n' +
    'Valid metrics:\n' +
    '  mm_net (Managed Money Net = Long minus Short)\n' +
    '  mm_long (MM Gross Long positions)\n' +
    '  mm_short (MM Gross Short positions)\n' +
    '  mm_net_pct_oi (MM Net as % of Open Interest)\n' +
    '  pm_net (Prod/Merchant Net)\n' +
    '  pm_long (Prod/Merchant Gross Long)\n' +
    '  pm_short (Prod/Merchant Gross Short)\n' +
    '  sd_net (Swap Dealers Net)\n' +
    '  or_net (Other Reportables Net)\n' +
    '  open_interest (Total Open Interest)\n\n' +
    'Examples:\n' +
    '  "plot 10 year MM net chart for cotton" → [CHART:{"commodity":"Cotton","metric":"mm_net","years":10,"crop_type":"all"}]\n' +
    '  "show me gold managed money longs since 2020" → [CHART:{"commodity":"Gold","metric":"mm_long","years":4,"crop_type":"all"}]\n' +
    '  "chart corn old crop MM net for 5 years" → [CHART:{"commodity":"Corn","metric":"mm_net","years":5,"crop_type":"old"}]\n' +
    '  "graph WTI crude open interest over 3 years" → [CHART:{"commodity":"WTI Crude Oil","metric":"open_interest","years":3,"crop_type":"all"}]\n\n' +
    'For questions without chart requests: answer concisely with bullet points. Use exact numbers from the data context. Max 450 words.';

  try{
    var res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          {role:'system', content: SYS},
          {role:'user', content: question + '\n\nDATA CONTEXT:\n' + context}
        ],
        max_tokens: 1400,
        temperature: 0.3
      })
    });
    if(!res.ok){
      var err = await res.json();
      throw new Error((err.error && err.error.message) || 'HTTP '+res.status);
    }
    var data = await res.json();
    var raw_answer = (data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'No response.';

    // Parse for chart tags
    var parsed = parseAiResponse(raw_answer);
    text.textContent = parsed.clean;
    resp.style.display = 'block';

    // Render each chart found
    if(parsed.specs.length > 0){
      parsed.specs.forEach(function(spec){ renderAiChart(spec); });
    }

  } catch(e){
    text.textContent = 'Error: '+e.message+'\n\nCheck your Groq API key at console.groq.com/keys';
    resp.style.display = 'block';
  }
  spin.style.display = 'none';
  resp.scrollIntoView({behavior:'smooth', block:'start'});
}

function renderSnapTable(data,tbody){
  if(!tbody)return;
  tbody.innerHTML='';
  var SO=['Energy','Grains','Industrial Metals','Precious Metals','Softs','Livestock'];
  var sorted=data.commodities.slice().sort(function(a,b){
    return SO.indexOf(a.sector)-SO.indexOf(b.sector)||a.name.localeCompare(b.name);
  });
  var lastSec='';
  sorted.forEach(function(comm){
    if(comm.sector!==lastSec){
      lastSec=comm.sector;
      var hr=document.createElement('tr');
      hr.innerHTML='<td colspan="12" style="background:#34495e;color:white;font-weight:700;padding:5px 8px;font-size:0.82em;">'+comm.sector+'</td>';
      tbody.appendChild(hr);
    }
    comm.variants.forEach(function(v,vi){
      var mm=v.categories&&v.categories.managed_money;if(!mm)return;
      var p=mm.pctiles||{},hn=(mm.historical&&mm.historical.net)||{};
      function pc(val){
        if(val<0)return'#999';if(val<=15)return'#c0392b';if(val<=30)return'#e67e22';
        if(val>=85)return'#1a8c4e';if(val>=70)return'#2980b9';return'#555';
      }
      function fmt(n){return(n!==undefined&&n!==null)?Number(n).toLocaleString():'—';}
      function fp(v){return v>=0?('<span style="color:'+pc(v)+';font-weight:700;">'+Number(v).toFixed(0)+'%</span>'):'—';}
      var row=document.createElement('tr');
      row.style.borderBottom='1px solid #eee';
      if(vi%2===1)row.style.background='#fafafa';
      row.innerHTML=
        '<td style="padding:4px 8px;font-weight:'+(vi===0?'600':'400')+';color:#1a1a1a;">'+(vi===0?comm.name+' ('+comm.ticker+')':'')+'</td>'+
        '<td style="padding:4px 6px;text-align:center;font-size:0.8em;color:#777;">'+(comm.is_crop?v.crop_type.toUpperCase():'—')+'</td>'+
        '<td style="padding:4px 6px;text-align:right;font-family:monospace;color:'+(mm.net>=0?'#1a8c4e':'#c0392b')+';font-weight:600;">'+(mm.net>=0?'+':'')+fmt(mm.net)+'</td>'+
        '<td style="padding:4px 6px;text-align:right;font-family:monospace;color:'+((mm.wk_chg_net||0)>=0?'#1a8c4e':'#c0392b')+';">'+(((mm.wk_chg_net||0)>=0)?'+':'')+fmt(mm.wk_chg_net)+'</td>'+
        '<td style="padding:4px 6px;text-align:center;">'+fp(p.net_full)+'</td>'+
        '<td style="padding:4px 6px;text-align:center;">'+fp(p.net_10yr)+'</td>'+
        '<td style="padding:4px 6px;text-align:center;">'+fp(p.long_full)+'</td>'+
        '<td style="padding:4px 6px;text-align:center;">'+fp(p.short_full)+'</td>'+
        '<td style="padding:4px 6px;text-align:right;font-family:monospace;font-size:0.8em;color:#c0392b;">'+fmt(hn['10yr_min'])+'<br><small style="color:#aaa;">'+(hn['10yr_min_date']||'')+'</small></td>'+
        '<td style="padding:4px 6px;text-align:right;font-family:monospace;font-size:0.8em;color:#1a8c4e;">'+fmt(hn['10yr_max'])+'<br><small style="color:#aaa;">'+(hn['10yr_max_date']||'')+'</small></td>'+
        '<td style="padding:4px 6px;text-align:right;font-family:monospace;font-size:0.8em;color:#c0392b;">'+fmt(hn.full_min)+'<br><small style="color:#aaa;">'+(hn.full_min_date||'')+'</small></td>'+
        '<td style="padding:4px 6px;text-align:right;font-family:monospace;font-size:0.8em;color:#1a8c4e;">'+fmt(hn.full_max)+'<br><small style="color:#aaa;">'+(hn.full_max_date||'')+'</small></td>';
      tbody.appendChild(row);
    });
  });
}


/* ===========================================================
   AI RESPONSE PARSING & CHART RENDERING
   =========================================================== */

/* Parse AI response for [CHART:{...}] tags and extract clean text */
function parseAiResponse(rawText){
  var clean = rawText;
  var specs = [];

  // Find all [CHART:{...}] tags
  var regex = /\[CHART:(\{[^\}]+\})\]/g;
  var match;

  while((match = regex.exec(rawText)) !== null){
    try{
      var spec = JSON.parse(match[1]);
      if(spec.commodity && spec.metric){
        specs.push(spec);
      }
    }catch(e){
      console.warn('Failed to parse chart spec:', match[1]);
    }
  }

  // Remove chart tags from clean text
  clean = clean.replace(/\[CHART:[^\]]+\]/g, '').trim();

  return {clean: clean, specs: specs};
}

/* Render a chart based on AI-requested spec */
function renderAiChart(spec){
  var area = document.getElementById('aiChartArea');
  var title = document.getElementById('aiChartTitle');
  var sub = document.getElementById('aiChartSub');
  var note = document.getElementById('aiChartNote');
  var spinner = document.getElementById('aiChartSpinner');

  area.style.display = 'block';
  spinner.style.display = 'block';

  // Map commodity name to API name
  var commApi = null;
  for(var i=0; i<allBCOM.length; i++){
    if(allBCOM[i].name.toLowerCase() === spec.commodity.toLowerCase()){
      commApi = allBCOM[i].api;
      break;
    }
  }

  if(!commApi){
    title.textContent = 'Error: Commodity not found';
    sub.textContent = spec.commodity;
    spinner.style.display = 'none';
    return;
  }

  // Determine metric mapping
  var metricMap = {
    'mm_net': {field: 'net', cat: 'managed_money', label: 'Managed Money Net'},
    'mm_long': {field: 'long', cat: 'managed_money', label: 'MM Gross Long'},
    'mm_short': {field: 'short', cat: 'managed_money', label: 'MM Gross Short'},
    'mm_net_pct_oi': {field: 'nPct', cat: 'managed_money', label: 'MM Net %OI'},
    'pm_net': {field: 'net', cat: 'prod_merc', label: 'Prod/Merchant Net'},
    'pm_long': {field: 'long', cat: 'prod_merc', label: 'PM Gross Long'},
    'pm_short': {field: 'short', cat: 'prod_merc', label: 'PM Gross Short'},
    'sd_net': {field: 'net', cat: 'swap_dealers', label: 'Swap Dealers Net'},
    'or_net': {field: 'net', cat: 'other_rept', label: 'Other Reportables Net'},
    'open_interest': {field: 'oi', cat: 'managed_money', label: 'Open Interest'}
  };

  var m = metricMap[spec.metric] || metricMap['mm_net'];

  title.textContent = m.label + ' — ' + spec.commodity;
  sub.textContent = (spec.years || 10) + ' year history' + (spec.crop_type && spec.crop_type !== 'all' ? ' (' + spec.crop_type + ' crop)' : '');

  // Calculate date range
  var endDate = new Date();
  var startDate = new Date();
  startDate.setFullYear(endDate.getFullYear() - (spec.years || 10));

  var ep = EP.combined;
  var enc = commApi.replace(/'/g, "''");
  var url = ep + "?$where=market_and_exchange_names='" + enc + "' AND report_date_as_yyyy_mm_dd >= '" + startDate.toISOString().split('T')[0] + "' AND report_date_as_yyyy_mm_dd <= '" + endDate.toISOString().split('T')[0] + "'&$order=report_date_as_yyyy_mm_dd ASC&$limit=10000";

  fetchT(url, 20000)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data || !data.length){
        throw new Error('No data returned from CFTC');
      }

      var p = procData(data, m.cat, spec.crop_type || 'all');
      if(!p){
        throw new Error('Failed to process data for ' + spec.crop_type + ' crop type');
      }

      // Get values
      var values, label, color;
      switch(m.field){
        case 'net': values = p.net; color = '#2a5298'; label = 'Net Position'; break;
        case 'long': values = p.long; color = '#1a8c4e'; label = 'Long'; break;
        case 'short': values = p.short; color = '#c0392b'; label = 'Short'; break;
        case 'nPct': values = p.nPct; color = '#2a5298'; label = 'Net %OI'; break;
        case 'lPct': values = p.lPct; color = '#1a8c4e'; label = 'Long %OI'; break;
        case 'sPct': values = p.sPct; color = '#c0392b'; label = 'Short %OI'; break;
        case 'oi': values = p.oi; color = '#8e44ad'; label = 'Open Interest'; break;
        default: values = p.net; color = '#2a5298'; label = 'Net';
      }

      var isPct = m.field.indexOf('Pct') !== -1 || m.field === 'nPct' || m.field === 'lPct' || m.field === 'sPct';

      // Create chart
      var ctx = document.getElementById('aiChartCanvas').getContext('2d');
      if(charts.aiChart) charts.aiChart.destroy();

      charts.aiChart = new Chart(ctx, {
        type: 'line',
        data: {
          datasets: [{
            label: label,
            data: pts(p.dates, values),
            borderColor: color,
            backgroundColor: color + '20',
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 5,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: true, position: 'top' },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  var v = ctx.raw.y;
                  return label + ': ' + (isPct ? v.toFixed(1) + '%' : v.toLocaleString());
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
              grid: { display: false },
              ticks: { maxTicksLimit: 12, font: { size: 9 } }
            },
            y: {
              grid: { color: 'rgba(0,0,0,0.05)' },
              ticks: {
                callback: function(v) {
                  return isPct ? v.toFixed(0) + '%' : (Math.abs(v) >= 1000 ? (v/1000).toFixed(0) + 'k' : v);
                },
                font: { size: 9 }
              }
            }
          }
        }
      });

      // Add note
      var latest = values[values.length - 1];
      var pctile = pct(values, latest);
      note.innerHTML = '<strong>Latest:</strong> ' + (isPct ? latest.toFixed(1) + '%' : latest.toLocaleString()) + 
                       ' | <strong>Historical %ile:</strong> ' + pctile.toFixed(0) + 'th percentile vs ' + spec.years + '-year range';

      spinner.style.display = 'none';
    })
    .catch(function(e){
      title.textContent = 'Error loading chart';
      sub.textContent = e.message;
      spinner.style.display = 'none';
      console.error('Chart error:', e);
    });
}
